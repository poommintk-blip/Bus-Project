<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚌 Bus Alert — ระบบแจ้งเตือนรถเมล์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0b1220;
    --surface:  #111d2e;
    --card:     #162032;
    --border:   #1e3050;
    --accent:   #f97316;
    --accent2:  #ef4444;
    --text:     #e2eaf6;
    --muted:    #5d7a99;
    --success:  #22c55e;
    --mono:     'Space Mono', monospace;
    --sans:     'Sarabun', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── background grid ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(249,115,22,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ── TOPBAR ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(11,18,32,.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo {
    font-family: var(--mono);
    font-size: 16px; font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .logo span { color: var(--text); }

  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px; color: var(--muted);
  }
  .chip b { color: var(--text); }

  /* ── PAGES ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── AUTH PAGE ── */
  .auth-wrap {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 80px 20px 40px;
    position: relative; z-index: 1;
  }

  .auth-box {
    width: 100%; max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.6);
    animation: fadeUp .4s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .auth-header {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    padding: 32px;
    text-align: center;
  }
  .auth-header .icon {
    font-size: 42px; display: block; margin-bottom: 10px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.3));
  }
  .auth-header h1 { font-size: 22px; font-weight: 700; color: #fff; }
  .auth-header p  { color: rgba(255,255,255,.8); font-size: 14px; margin-top: 4px; }

  .auth-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .auth-tab {
    flex: 1; padding: 14px;
    text-align: center; font-size: 14px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .auth-body { padding: 28px 32px 32px; }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-size: 13px; color: var(--muted);
    margin-bottom: 6px; font-weight: 600;
  }
  .form-group input {
    width: 100%; padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text); font-size: 15px; font-family: var(--sans);
    outline: none; transition: border-color .2s;
  }
  .form-group input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px;
    color: #fff; font-size: 16px; font-weight: 700;
    font-family: var(--sans);
    cursor: pointer; transition: opacity .2s, transform .1s;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .msg {
    margin-top: 14px; padding: 12px 16px;
    border-radius: 8px; font-size: 14px;
    text-align: center; display: none;
  }
  .msg.error   { background: #ef44441a; border: 1px solid #ef444440; color: #f87171; display: block; }
  .msg.success { background: #22c55e1a; border: 1px solid #22c55e40; color: #4ade80; display: block; }

  /* ── DASHBOARD ── */
  .dash {
    padding: 80px 24px 40px;
    max-width: 1100px; margin: 0 auto;
    position: relative; z-index: 1;
  }

  .dash-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
  }
  .dash-header h2 {
    font-size: 24px; font-weight: 700;
  }
  .dash-header h2 span { color: var(--accent); }

  .toggle-wrap {
    display: flex; align-items: center; gap: 10px;
  }
  .toggle-label { font-size: 14px; color: var(--muted); }

  .toggle {
    width: 48px; height: 26px;
    background: var(--border); border-radius: 13px;
    position: relative; cursor: pointer;
    transition: background .3s;
    border: none; outline: none;
  }
  .toggle.on { background: var(--success); }
  .toggle::after {
    content: '';
    position: absolute; top: 3px; left: 3px;
    width: 20px; height: 20px;
    background: #fff; border-radius: 50%;
    transition: left .3s;
  }
  .toggle.on::after { left: 25px; }

  /* ── CARDS GRID ── */
  .section-title {
    font-family: var(--mono);
    font-size: 11px; font-weight: 700;
    color: var(--accent); letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .bus-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px; margin-bottom: 40px;
  }

  .bus-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
    transition: border-color .2s, transform .2s;
    position: relative; overflow: hidden;
  }
  .bus-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .bus-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity .2s;
  }
  .bus-card:hover::before { opacity: 1; }

  .bus-card.stopped {
    border-color: var(--accent2);
    background: linear-gradient(135deg, #1a1025, var(--card));
  }
  .bus-card.stopped::before { opacity: 1; }

  .bus-name {
    font-family: var(--mono); font-size: 16px; font-weight: 700;
    color: var(--text); margin-bottom: 4px;
  }
  .bus-route {
    font-size: 12px; color: var(--muted); margin-bottom: 14px;
  }

  .bus-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    margin-bottom: 14px;
  }
  .bus-status.running { background: #22c55e15; color: var(--success); border: 1px solid #22c55e30; }
  .bus-status.stopped { background: #ef444415; color: #f87171;      border: 1px solid #ef444430; }
  .bus-status.unknown { background: #ffffff10; color: var(--muted);  border: 1px solid var(--border); }

  .pulse { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .pulse.green { background: var(--success); animation: pulse-g 1.5s infinite; }
  .pulse.red   { background: #ef4444;        animation: pulse-r 1s infinite; }
  .pulse.gray  { background: var(--muted); }

  @keyframes pulse-g { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes pulse-r { 0%,100%{opacity:1} 50%{opacity:.3} }

  .bus-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .meta-item { }
  .meta-item .k { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .meta-item .v { font-size: 13px; font-family: var(--mono); color: var(--text); }

  /* ── NOTIFICATIONS ── */
  .notif-list { display: flex; flex-direction: column; gap: 10px; }

  .notif-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
    animation: fadeUp .3s ease;
  }

  .notif-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent)22, var(--accent2)22);
    border: 1px solid var(--accent)33;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .notif-info { flex: 1; }
  .notif-info .bus { font-weight: 700; font-size: 15px; }
  .notif-info .detail {
    font-size: 12px; color: var(--muted); margin-top: 2px;
  }
  .notif-time {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    text-align: right; flex-shrink: 0;
  }

  .empty-state {
    text-align: center; padding: 48px 20px;
    color: var(--muted); font-size: 14px;
  }
  .empty-state .icon { font-size: 40px; display:block; margin-bottom: 12px; opacity: .5; }

  /* ── LOGOUT BTN ── */
  .btn-logout {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted); font-size: 13px;
    font-family: var(--sans);
    cursor: pointer; transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--accent2); color: #f87171; }

  /* ── REFRESH ── */
  .btn-refresh {
    padding: 8px 18px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    font-family: var(--sans); cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  .spin { animation: spin .8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .auth-body { padding: 20px; }
    .dash { padding: 72px 16px 40px; }
    .dash-header h2 { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- ═══════════════ TOPBAR ═══════════════ -->
<div class="topbar">
  <div class="logo">🚌 <span>Bus</span>Alert</div>
  <div class="topbar-right" id="topbarRight" style="display:none">
    <div class="chip">สวัสดี <b id="topName"></b></div>
    <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
  </div>
</div>

<!-- ═══════════════ AUTH PAGE ═══════════════ -->
<div class="page active" id="pageAuth">
  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-header">
        <span class="icon">🚌</span>
        <h1>Bus Alert</h1>
        <p>ระบบแจ้งเตือนรถเมล์จอด ผ่านอีเมล</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">เข้าสู่ระบบ</div>
        <div class="auth-tab" onclick="switchTab('register')">สมัครสมาชิก</div>
      </div>

      <div class="auth-body">
        <!-- LOGIN -->
        <div id="formLogin">
          <div class="form-group">
            <label>อีเมล</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label>รหัสผ่าน</label>
            <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"
                   onkeydown="if(event.key==='Enter')doLogin()">
          </div>
          <button class="btn-primary" onclick="doLogin()" id="btnLogin">เข้าสู่ระบบ</button>
          <div class="msg" id="loginMsg"></div>
        </div>

        <!-- REGISTER -->
        <div id="formRegister" style="display:none">
          <div class="form-group">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="regName" placeholder="กรอกชื่อของคุณ">
          </div>
          <div class="form-group">
            <label>อีเมล <span style="color:var(--muted);font-size:12px">(ใช้รับแจ้งเตือน)</span></label>
            <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label>รหัสผ่าน <span style="color:var(--muted);font-size:12px">(อย่างน้อย 6 ตัว)</span></label>
            <input type="password" id="regPass" placeholder="••••••••"
                   onkeydown="if(event.key==='Enter')doRegister()">
          </div>
          <button class="btn-primary" onclick="doRegister()" id="btnRegister">สมัครสมาชิก</button>
          <div class="msg" id="registerMsg"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ DASHBOARD ═══════════════ -->
<div class="page" id="pageDash">
  <div class="dash">

    <div class="dash-header">
      <h2>สถานะรถเมล์ <span>สดๆ</span></h2>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="toggle-wrap">
          <span class="toggle-label">รับแจ้งเตือน</span>
          <button class="toggle" id="toggleNotif" onclick="toggleNotification()"></button>
        </div>
        <button class="btn-refresh" onclick="loadBuses()" id="refreshBtn">
          ⟳ รีเฟรช
        </button>
      </div>
    </div>

    <div class="section-title">รถทั้งหมด</div>
    <div class="bus-grid" id="busGrid">
      <div class="empty-state" style="grid-column:1/-1">
        <span class="icon">🔄</span>กำลังโหลด...
      </div>
    </div>

    <div class="section-title">ประวัติการแจ้งเตือน</div>
    <div class="notif-list" id="notifList">
      <div class="empty-state">
        <span class="icon">🔔</span>ยังไม่มีการแจ้งเตือน
      </div>
    </div>

  </div>
</div>

<script>
const API = 'http://localhost:5000/api'
let currentUser  = null
let currentToken = null
let notifActive  = true
let refreshTimer = null

// ────────────────────────────────────
// SESSION
// ────────────────────────────────────
function saveSession(token, user) {
  currentToken = token
  currentUser  = user
  localStorage.setItem('bus_token', token)
  localStorage.setItem('bus_user',  JSON.stringify(user))
}

function loadSession() {
  const t = localStorage.getItem('bus_token')
  const u = localStorage.getItem('bus_user')
  if (t && u) {
    currentToken = t
    currentUser  = JSON.parse(u)
    return true
  }
  return false
}

function clearSession() {
  currentToken = null; currentUser = null
  localStorage.removeItem('bus_token')
  localStorage.removeItem('bus_user')
}

// ────────────────────────────────────
// PAGES
// ────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

function showDash() {
  document.getElementById('topbarRight').style.display = 'flex'
  document.getElementById('topName').textContent = currentUser.name
  notifActive = currentUser.active !== false
  updateToggleUI()
  showPage('pageDash')
  loadBuses()
  loadNotifications()
  clearInterval(refreshTimer)
  refreshTimer = setInterval(() => { loadBuses(); loadNotifications() }, 20000)
}

// ────────────────────────────────────
// TABS
// ────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) =>
    t.classList.toggle('active', (tab==='login') ? i===0 : i===1)
  )
  document.getElementById('formLogin').style.display    = tab==='login'    ? '' : 'none'
  document.getElementById('formRegister').style.display = tab==='register' ? '' : 'none'
}

// ────────────────────────────────────
// LOGIN
// ────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim()
  const pass  = document.getElementById('loginPass').value.trim()
  const msgEl = document.getElementById('loginMsg')
  const btn   = document.getElementById('btnLogin')
  msgEl.className = 'msg'; msgEl.textContent = ''

  if (!email || !pass) { showMsg(msgEl,'error','กรุณากรอกข้อมูลให้ครบ'); return }

  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...'
  try {
    const res  = await fetch(`${API}/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass})
    })
    const data = await res.json()
    if (!res.ok) { showMsg(msgEl,'error', data.error || 'เกิดข้อผิดพลาด'); return }
    saveSession(data.token, data.user)
    showDash()
  } catch(e) {
    showMsg(msgEl,'error','ไม่สามารถเชื่อมต่อ server ได้')
  } finally {
    btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'
  }
}

// ────────────────────────────────────
// REGISTER
// ────────────────────────────────────
async function doRegister() {
  const name  = document.getElementById('regName').value.trim()
  const email = document.getElementById('regEmail').value.trim()
  const pass  = document.getElementById('regPass').value.trim()
  const msgEl = document.getElementById('registerMsg')
  const btn   = document.getElementById('btnRegister')
  msgEl.className = 'msg'; msgEl.textContent = ''

  if (!name || !email || !pass) { showMsg(msgEl,'error','กรุณากรอกข้อมูลให้ครบ'); return }

  btn.disabled = true; btn.textContent = 'กำลังสมัคร...'
  try {
    const res  = await fetch(`${API}/register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password: pass})
    })
    const data = await res.json()
    if (!res.ok) { showMsg(msgEl,'error', data.error || 'เกิดข้อผิดพลาด'); return }
    showMsg(msgEl,'success','✅ สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ')
    setTimeout(() => switchTab('login'), 1500)
    document.getElementById('loginEmail').value = email
  } catch(e) {
    showMsg(msgEl,'error','ไม่สามารถเชื่อมต่อ server ได้')
  } finally {
    btn.disabled = false; btn.textContent = 'สมัครสมาชิก'
  }
}

// ────────────────────────────────────
// LOGOUT
// ────────────────────────────────────
async function logout() {
  clearInterval(refreshTimer)
  await fetch(`${API}/logout`, {
    method:'POST', headers:{'Authorization':'Bearer '+currentToken}
  }).catch(()=>{})
  clearSession()
  document.getElementById('topbarRight').style.display = 'none'
  showPage('pageAuth')
}

// ────────────────────────────────────
// TOGGLE NOTIFICATION
// ────────────────────────────────────
async function toggleNotification() {
  notifActive = !notifActive
  updateToggleUI()
  try {
    await fetch(`${API}/subscribe`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+currentToken},
      body: JSON.stringify({active: notifActive})
    })
  } catch(e) {}
}

function updateToggleUI() {
  const el = document.getElementById('toggleNotif')
  el.classList.toggle('on', notifActive)
}

// ────────────────────────────────────
// LOAD BUSES
// ────────────────────────────────────
async function loadBuses() {
  const btn = document.getElementById('refreshBtn')
  btn.innerHTML = '<span class="spin">⟳</span> กำลังโหลด...'
  try {
    const res  = await fetch(`${API}/buses`)
    const data = await res.json()
    renderBuses(data)
  } catch(e) {
    document.getElementById('busGrid').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1"><span class="icon">⚠️</span>ไม่สามารถโหลดข้อมูลรถได้</div>'
  } finally {
    btn.innerHTML = '⟳ รีเฟรช'
  }
}

function renderBuses(buses) {
  const grid = document.getElementById('busGrid')
  if (!buses.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><span class="icon">🚌</span>ยังไม่มีข้อมูลรถ</div>'
    return
  }

  grid.innerHTML = buses.map(b => {
    const st = (b.status || '').toLowerCase()
    const stopped = st.includes('stop') || st.includes('idle') || st.includes('จอด')
    const moving  = !stopped && b.speed && parseFloat(b.speed) > 0

    const statusClass = stopped ? 'stopped' : moving ? 'running' : 'unknown'
    const pulseClass  = stopped ? 'red' : moving ? 'green' : 'gray'
    const statusText  = stopped ? '🛑 จอด' : moving ? '🚌 กำลังวิ่ง' : '— ไม่ทราบ'

    const lat  = b.lat  ? parseFloat(b.lat).toFixed(5)  : '-'
    const lon  = b.lon  ? parseFloat(b.lon).toFixed(5)  : '-'
    const spd  = b.speed ? parseFloat(b.speed).toFixed(1)+' km/h' : '-'
    const mapsLink = b.lat && b.lon
      ? `https://www.google.com/maps?q=${b.lat},${b.lon}`
      : null

    return `
    <div class="bus-card ${stopped ? 'stopped' : ''}">
      <div class="bus-name">${b.name || b.id.slice(0,8)+'...'}</div>
      <div class="bus-route">สาย ${b.route || '-'} ${b.label ? '· '+b.label : ''}</div>
      <div class="bus-status ${statusClass}">
        <span class="pulse ${pulseClass}"></span> ${statusText}
      </div>
      <div class="bus-meta">
        <div class="meta-item"><div class="k">LATITUDE</div><div class="v">${lat}</div></div>
        <div class="meta-item"><div class="k">LONGITUDE</div><div class="v">${lon}</div></div>
        <div class="meta-item"><div class="k">SPEED</div><div class="v">${spd}</div></div>
        <div class="meta-item"><div class="k">ที่นั่งว่าง</div><div class="v">${b.seats ?? '-'}</div></div>
      </div>
      ${mapsLink ? `<a href="${mapsLink}" target="_blank"
          style="display:block;text-align:center;margin-top:14px;padding:8px;
                 border:1px solid var(--border);border-radius:8px;
                 color:var(--muted);font-size:12px;text-decoration:none;transition:all .2s"
          onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
          onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
          📍 ดูใน Maps
        </a>` : ''}
    </div>`
  }).join('')
}

// ────────────────────────────────────
// LOAD NOTIFICATIONS
// ────────────────────────────────────
async function loadNotifications() {
  try {
    const res  = await fetch(`${API}/notifications`, {
      headers:{'Authorization':'Bearer '+currentToken}
    })
    if (!res.ok) return
    const data = await res.json()
    renderNotifications(data)
  } catch(e) {}
}

function renderNotifications(list) {
  const el = document.getElementById('notifList')
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><span class="icon">🔔</span>ยังไม่มีการแจ้งเตือน<br><small style="color:var(--muted)">ระบบจะส่งอีเมลเมื่อรถจอดที่ป้าย</small></div>'
    return
  }
  el.innerHTML = list.map(n => {
    const mapsLink = n.lat && n.lon
      ? `https://www.google.com/maps?q=${n.lat},${n.lon}`
      : null
    const time = n.sent_at ? n.sent_at.replace('T',' ').slice(0,16) : '-'
    return `
    <div class="notif-item">
      <div class="notif-icon">🚌</div>
      <div class="notif-info">
        <div class="bus">${n.bus_name || '-'} ${n.route ? '· สาย '+n.route : ''}</div>
        <div class="detail">
          สถานะ: ${n.status || '-'} · ที่นั่งว่าง: ${n.seats ?? '-'}
          ${mapsLink ? `· <a href="${mapsLink}" target="_blank" style="color:var(--accent)">Maps</a>` : ''}
        </div>
      </div>
      <div class="notif-time">${time}</div>
    </div>`
  }).join('')
}

// ────────────────────────────────────
// HELPERS
// ────────────────────────────────────
function showMsg(el, type, text) {
  el.className = `msg ${type}`
  el.textContent = text
}

// ────────────────────────────────────
// INIT
// ────────────────────────────────────
window.onload = async () => {
  if (loadSession()) {
    // verify token still valid
    try {
      const res = await fetch(`${API}/me`, {
        headers:{'Authorization':'Bearer '+currentToken}
      })
      if (res.ok) {
        currentUser = await res.json()
        showDash(); return
      }
    } catch(e) {}
    clearSession()
  }
  showPage('pageAuth')
}
</script>
